name: Test on Raspberry Pi Debian

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  chezmoi-dry-run:
    name: chezmoi dry-run (RPi-like)
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
      options: --hostname pi-test

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: apt-get update -qq && apt-get install -y -qq curl ca-certificates

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin

      - name: Dry-run chezmoi apply
        run: |
          cp -r "$GITHUB_WORKSPACE" /tmp/dot
          rm -rf /tmp/dot/.git
          chezmoi init --source=/tmp/dot
          chezmoi apply --source=/tmp/dot
